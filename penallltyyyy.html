<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>بازی پنالتی ساده</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
      font-family: sans-serif;
      color: #fff;
    }
    canvas {
      background: #1b5e20;
      border: 2px solid #fff;
      box-shadow: 0 0 20px #000;
      touch-action: manipulation;
    }
    #info {
      position: fixed;
      top: 10px;
      text-align: center;
      width: 100%;
      font-size: 16px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="info">روی یکی از سه ناحیه در دروازه کلیک کن تا شوت بزنی!</div>
<canvas id="game" width="480" height="640"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// موقعیت‌ها
const goalY = 120;
const penaltySpotY = 480;
const ballRadius = 10;

// وضعیت بازی
let score = 0;
let shots = 0;
let message = 'برای شوت، روی دروازه کلیک کن';
let ball = { x: W / 2, y: penaltySpotY, targetX: W / 2, targetY: goalY + 20, moving: false };
let goalie = { x: W / 2, y: goalY + 40, halfWidth: 50 };
let animReq = null;

// رسم زمین و دروازه
function drawField() {
  // چمن
  ctx.fillStyle = '#1b5e20';
  ctx.fillRect(0, 0, W, H);

  // خط محوطه
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.strokeRect(40, goalY - 10, W - 80, 120);

  // دروازه
  ctx.strokeStyle = '#eeeeee';
  ctx.lineWidth = 4;
  ctx.strokeRect(80, goalY - 40, W - 160, 40);

  // نقطه پنالتی
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(W / 2, penaltySpotY, 3, 0, Math.PI * 2);
  ctx.fill();

  // تقسیم سه ناحیه دروازه
  ctx.setLineDash([5, 5]);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(W / 3, goalY - 40);
  ctx.lineTo(W / 3, goalY);
  ctx.moveTo(2 * W / 3, goalY - 40);
  ctx.lineTo(2 * W / 3, goalY);
  ctx.stroke();
  ctx.setLineDash([]);
}

// رسم دروازه‌بان
function drawGoalie() {
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath();
  ctx.ellipse(goalie.x, goalie.y, goalie.halfWidth, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#000';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('دروازه‌بان', goalie.x, goalie.y + 5);
}

// رسم توپ
function drawBall() {
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// متن‌ها
function drawHUD() {
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('گل‌ها: ' + score, 20, 30);
  ctx.fillText('شوت‌ها: ' + shots, 20, 55);

  ctx.textAlign = 'center';
  ctx.font = '16px sans-serif';
  ctx.fillText(message, W / 2, H - 30);
}

// آپدیت توپ
function updateBall() {
  if (!ball.moving) return;

  const speed = 12;
  const dx = ball.targetX - ball.x;
  const dy = ball.targetY - ball.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < speed) {
    ball.x = ball.targetX;
    ball.y = ball.targetY;
    ball.moving = false;
    checkResult();
    return;
  }

  ball.x += (dx / dist) * speed;
  ball.y += (dy / dist) * speed;
}

// بررسی گل یا مهار
function checkResult() {
  // اگر توپ در محدوده افقی دروازه‌بان باشد → مهار
  const goalieLeft = goalie.x - goalie.halfWidth;
  const goalieRight = goalie.x + goalie.halfWidth;

  if (ball.x > goalieLeft && ball.x < goalieRight && ball.y <= goalie.y + 20) {
    message = 'مهار شد! 😅 دوباره امتحان کن';
  } else {
    score++;
    message = 'گللل! 🎉 ادامه بده';
  }

  setTimeout(resetShot, 700);
}

// ریست برای شوت بعدی
function resetShot() {
  ball.x = W / 2;
  ball.y = penaltySpotY;
  ball.moving = false;
  message = 'روی یکی از سه ناحیه دروازه کلیک کن';
}

// انتخاب جهت شوت
function shootTo(x) {
  if (ball.moving) return;

  shots++;

  // تعیین ناحیه کلیک (چپ، وسط، راست)
  let zone;
  if (x < W / 3) zone = 'left';
  else if (x > 2 * W / 3) zone = 'right';
  else zone = 'center';

  // هدف توپ
  let targetX;
  if (zone === 'left') targetX = W / 6;
  else if (zone === 'right') targetX = 5 * W / 6;
  else targetX = W / 2;

  ball.targetX = targetX;
  ball.targetY = goalY + 10;

  // حرکت تصادفی دروازه‌بان به یکی از سه ناحیه
  const goalieZone = Math.floor(Math.random() * 3); // 0,1,2
  if (goalieZone === 0) goalie.x = W / 6;
  else if (goalieZone === 1) goalie.x = W / 2;
  else goalie.x = 5 * W / 6;

  ball.moving = true;
  message = 'شوت زدی! ببینیم گل می‌شه یا نه...';
}

// حلقه اصلی
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawField();
  drawGoalie();
  updateBall();
  drawBall();
  drawHUD();
  animReq = requestAnimationFrame(loop);
}

// رویداد کلیک / لمس
function getCanvasPos(evt) {
  const rect = canvas.getBoundingClientRect();
  const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
  return {
    x: (clientX - rect.left) * (canvas.width / rect.width),
    y: (clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('click', function (e) {
  const pos = getCanvasPos(e);
  // فقط اگر روی ناحیه دروازه کلیک شد
  if (pos.y < goalY + 20 && pos.y > goalY - 60) {
    shootTo(pos.x);
  }
});

canvas.addEventListener('touchstart', function (e) {
  e.preventDefault();
  const pos = getCanvasPos(e);
  if (pos.y < goalY + 20 && pos.y > goalY - 60) {
    shootTo(pos.x);
  }
}, { passive: false });

// شروع
loop();
</script>
</body>
</html>
